services:
  verdaccio:
    image: verdaccio:6.5.0
    container_name: verdaccio
    networks:
      - 1panel-network
    environment:
      - VERDACCIO_PORT=4873
    volumes:
      - ./data/storage:/verdaccio/storage
      - ./data/config:/verdaccio/conf
      - ./data/plugins:/verdaccio/plugins
    labels:
      createdBy: 'Apps'
networks:
  1panel-network:
    external: true
